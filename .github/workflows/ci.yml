name: Oxy CI

permissions:
  contents: write

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Ubuntu native dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Install dependencies
        run: npm install
      - name: Verify frontend
        run: ./build/ci/verify-frontend.sh
      - name: Verify Rust
        run: ./build/ci/verify-rust.sh
      - name: Verify security baseline
        run: ./build/ci/verify-security.sh
  package-ubuntu:
    name: Package Ubuntu
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Ubuntu native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Install dependencies
        run: npm install
      - name: Build Tauri app
        run: npx tauri build
  package-windows:
    name: Package Windows
    runs-on: windows-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: npm install
      - name: Build backend sidecar
        run: powershell -ExecutionPolicy Bypass -File build/windows/build-backend.ps1
      - name: Build Windows installers
        run: npx tauri build --bundles msi,nsis
      - name: Generate checksums
        shell: pwsh
        run: |
          $files = Get-ChildItem src-tauri/target/release/bundle/msi,src-tauri/target/release/bundle/nsis -File
          $hashes = foreach ($file in $files) {
            $hash = (Get-FileHash $file.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($file.Name)"
          }
          $hashes | Set-Content src-tauri/target/release/bundle/SHA256SUMS.txt
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oxy-windows-bundles
          path: |
            src-tauri/target/release/bundle/msi/*
            src-tauri/target/release/bundle/nsis/*
            src-tauri/target/release/bundle/SHA256SUMS.txt
      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*
            src-tauri/target/release/bundle/nsis/*
            src-tauri/target/release/bundle/SHA256SUMS.txt
