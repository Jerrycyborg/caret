name: Caret CI

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        run: npm install

      - name: Type-check frontend
        run: npx tsc --noEmit

      - name: Check Rust
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build backend sidecar
        run: powershell -ExecutionPolicy Bypass -File build/windows/build-backend.ps1

      - name: Build Windows installer
        run: npx tauri build --bundles nsis

      - name: Generate checksum
        shell: pwsh
        run: |
          $files = Get-ChildItem src-tauri/target/release/bundle/nsis -File -Filter "*.exe"
          $hashes = foreach ($file in $files) {
            $hash = (Get-FileHash $file.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($file.Name)"
          }
          $hashes | Set-Content src-tauri/target/release/bundle/nsis/SHA256SUMS.txt

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: caret-windows-installer
          retention-days: 30
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/SHA256SUMS.txt

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/SHA256SUMS.txt
