# Caret Management Server — Nginx reverse proxy config
# Place in /etc/nginx/sites-available/caret-mgmt and symlink to sites-enabled
#
# Assumes SSL is already configured by ISPConfig / Let's Encrypt.
# This file adds the /admin location block to your existing vhost.
# If you manage vhosts via ISPConfig, add the location block to the
# "Apache Directives" / "Nginx Directives" field for caret.tws-partners.com.

server {
    listen 443 ssl;
    server_name caret.tws-partners.com;

    # Let ISPConfig manage SSL cert paths — replace if needed
    # ssl_certificate     /etc/letsencrypt/live/caret.tws-partners.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/caret.tws-partners.com/privkey.pem;

    # Fleet dashboard + API — admin-only via bearer token
    location /admin/ {
        proxy_pass         http://127.0.0.1:8100/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # Optional: restrict to office/VPN IP ranges
        # allow 10.0.0.0/8;
        # allow 192.168.0.0/16;
        # deny all;
    }

    # Redirect bare /admin to /admin/
    location = /admin {
        return 301 /admin/;
    }

    # Device checkins — accessible from all corporate machines
    location /admin/v1/devices/checkin {
        proxy_pass         http://127.0.0.1:8100/v1/devices/checkin;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name caret.tws-partners.com;
    return 301 https://$host$request_uri;
}
