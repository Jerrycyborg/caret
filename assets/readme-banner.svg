      <stop stop-color="#07111F"/>
      <stop offset="0.45" stop-color="#0D1A2B"/>
      <stop offset="1" stop-color="#08131F"/>
    </linearGradient>
    <linearGradient id="glowA" x1="184" y1="132" x2="612" y2="406" gradientUnits="userSpaceOnUse">
      <stop stop-color="#53E0B4"/>
      <stop offset="0.5" stop-color="#66A9FF"/>
      <stop offset="1" stop-color="#FFB36B"/>
    </linearGradient>
    <linearGradient id="glowB" x1="984" y1="126" x2="1366" y2="418" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12233A"/>
      <stop offset="1" stop-color="#0D1727"/>
    </linearGradient>
    <filter id="blur" x="0" y="0" width="1600" height="560" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="44"/>
