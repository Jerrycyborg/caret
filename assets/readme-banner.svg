  <rect width="1600" height="560" rx="30" fill="url(#bg)"/>

  <g filter="url(#blur)" opacity="0.42">
    <circle cx="1312" cy="102" r="136" fill="#53E0B4"/>
    <circle cx="336" cy="528" r="188" fill="#4E73FF"/>
    <circle cx="1432" cy="470" r="156" fill="#FF9F52"/>
  </g>

  <rect x="34" y="34" width="1532" height="492" rx="28" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>

  <g>
    <rect x="96" y="92" width="138" height="138" rx="34" fill="url(#glowA)"/>
    <path d="M141 139C141 121.327 155.327 107 173 107H183C222.765 107 255 139.235 255 179V187C255 226.765 222.765 259 183 259H173C155.327 259 141 244.673 141 227V139Z" fill="#07101A"/>
    <path d="M172 142H181C203.644 142 222 160.356 222 183C222 205.644 203.644 224 181 224H172V142Z" fill="url(#glowA)"/>
  </g>

  <text x="280" y="160" fill="#ECF4FF" font-family="Segoe UI, Arial, sans-serif" font-size="82" font-weight="700" letter-spacing="2">Oxy</text>
  <text x="282" y="214" fill="#95A9C7" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="500">Local-first AI operator hub for device support, development work, and supervised execution</text>

  <text x="98" y="312" fill="#ECF4FF" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600">Plan</text>
  <circle cx="167" cy="302" r="7" fill="#53E0B4"/>
  <text x="187" y="312" fill="#ECF4FF" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600">Ask</text>
  <circle cx="251" cy="302" r="7" fill="#66A9FF"/>
  <text x="271" y="312" fill="#ECF4FF" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600">Execute</text>
  <circle cx="386" cy="302" r="7" fill="#FFB36B"/>
  <text x="406" y="312" fill="#ECF4FF" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600">Observe</text>
  <circle cx="532" cy="302" r="7" fill="#53E0B4"/>
  <text x="552" y="312" fill="#ECF4FF" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600">Report back</text>

  <text x="98" y="370" fill="#95A9C7" font-family="Segoe UI, Arial, sans-serif" font-size="24">Device support on the machine. Orchestrated work across local tools, OpenClaw, and Wraith.</text>
  <text x="98" y="406" fill="#95A9C7" font-family="Segoe UI, Arial, sans-serif" font-size="24">One session model. One approval model. Rust-owned privileged boundaries.</text>

  <g>
    <rect x="1012" y="96" width="476" height="332" rx="28" fill="url(#glowB)" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
    <text x="1054" y="146" fill="#ECF4FF" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="600">Operator Surface</text>

    <rect x="1054" y="176" width="194" height="46" rx="16" fill="rgba(102,169,255,0.14)"/>
    <text x="1076" y="205" fill="#D6E6FF" font-family="Segoe UI, Arial, sans-serif" font-size="18">desktop / telegram / whatsapp</text>

    <rect x="1264" y="176" width="176" height="46" rx="16" fill="rgba(83,224,180,0.14)"/>
    <text x="1286" y="205" fill="#DBFFF4" font-family="Segoe UI, Arial, sans-serif" font-size="18">session-aware tasks</text>

    <rect x="1054" y="244" width="172" height="46" rx="16" fill="rgba(255,179,107,0.14)"/>
    <text x="1076" y="273" fill="#FFE7CF" font-family="Segoe UI, Arial, sans-serif" font-size="18">task-level approval</text>

    <rect x="1242" y="244" width="198" height="46" rx="16" fill="rgba(255,255,255,0.08)"/>
    <text x="1264" y="273" fill="#ECF4FF" font-family="Segoe UI, Arial, sans-serif" font-size="18">Rust boundary stops</text>

    <rect x="1054" y="312" width="162" height="46" rx="16" fill="rgba(83,224,180,0.12)"/>
    <text x="1076" y="341" fill="#DBFFF4" font-family="Segoe UI, Arial, sans-serif" font-size="18">OpenClaw executor</text>

    <rect x="1232" y="312" width="128" height="46" rx="16" fill="rgba(102,169,255,0.12)"/>
    <text x="1254" y="341" fill="#D6E6FF" font-family="Segoe UI, Arial, sans-serif" font-size="18">Wraith executor</text>

    <rect x="1376" y="312" width="64" height="46" rx="16" fill="rgba(255,179,107,0.12)"/>
    <text x="1397" y="341" fill="#FFE7CF" font-family="Segoe UI, Arial, sans-serif" font-size="18">local</text>
  </g>

  <text x="98" y="486" fill="#ECF4FF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Current build direction</text>
  <text x="98" y="514" fill="#95A9C7" font-family="Segoe UI, Arial, sans-serif" font-size="18">Oxy stays user-facing. Executors stay behind it. Device support stays first-class.</text>
